services:
  rollup-watch:
    extends:
      file: ./base.docker-compose.yml
      service: rollup
    environment:
      - NODE_ENV=development
      - ROLLUP_WATCH=true
      - FORCE_COLOR=1
    entrypoint: ["/bin/sh", "-c", "sleep 3 && bun run watch"]
    depends_on:
      npgsqlrest-dev:
        condition: service_started

  npgsqlrest-dev:
    extends:
      file: ./base.docker-compose.yml
      service: npgsqlrest-dev

  pgmigrations:
    extends:
      file: ./base.docker-compose.yml
      service: pgmigrations

  postgres:
    extends:
      file: ./base.docker-compose.yml
      service: postgres
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

volumes:
  postgres_data_dev: